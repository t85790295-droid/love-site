<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Для тебя ❤️</title>
  <style>
    body { font-family: sans-serif; background: #ffe6e6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
    #heart-screen { text-align: center; cursor: pointer; }
    .heart { font-size: 100px; color: #ff4d4d; animation: pulse 1.5s infinite; display: inline-block; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    
    #question-screen, #final-screen { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 90%; }
    
    .btn { padding: 10px 20px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-yes { background: #ff4d4d; color: white; }
    .btn-strong { background: #ff0055; color: white; }
    .btn:hover { transform: scale(1.1); }

    #final-screen { width: 450px; max-width: 95%; overflow-y: auto; max-height: 90vh; }
    .couple-photo { width: 100%; border-radius: 15px; margin-bottom: 20px; }
    .text-content { text-align: center; line-height: 1.6; color: #444; }
    
    .easter-egg { color: #ff4d4d; font-weight: bold; font-size: 12px; margin-top: 20px; border-top: 1px dashed #ff4d4d; padding-top: 10px; opacity: 0.8; }
    
    .floating-heart { position: fixed; color: #ff4d4d; font-size: 20px; pointer-events: none; z-index: 1000; animation: move linear forwards; }
    @keyframes move {
      0% { transform: translateY(100vh) scale(0); opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="heart-screen" onclick="showQuestion()">
    <div class="heart">❤️</div>
    <p style="color: #ff4d4d; font-weight: bold;">Нажми на сердечко</p>
  </div>

  <div id="question-screen">
    <h2>Ты меня любишь?</h2>
    <button class="btn btn-yes" onclick="showError()">Да</button>
    <button class="btn btn-strong" onclick="showFinal()">Очень сильно!</button>
  </div>

  <div id="final-screen">
    <img src="photo_5362063096656106523_y.jpg" alt="Наша фотография" class="couple-photo">
    <div class="text-content">
      <h3>Я тоже тебя очень люблю! ❤️</h3>
      <p>Ты — мой самый близкий человек. Спасибо за то, что ты есть в моей жизни, за твою поддержку и за каждый момент, проведенный вместе.</p>
      <p>Пусть это маленькое признание поднимет тебе настроение!</p>
      <div class="easter-egg">( У ТЯБЕ БОЛЬШОЙ БОЛТ )</div>
    </div>
  </div>

  <script>
    function showQuestion() {
      document.getElementById('heart-screen').style.display = 'none';
      document.getElementById('question-screen').style.display = 'block';
    }

    function showError() {
      alert("Ошибка: Этого ответа недостаточно! Попробуй кнопку справа 😉");
    }

    function showFinal() {
      document.getElementById('question-screen').style.display = 'none';
      document.getElementById('final-screen').style.display = 'block';
      setInterval(createHeart, 300);
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('floating-heart');
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }
  </script>

</body>
</html>
